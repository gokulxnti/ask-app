<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ask App" />
<title>Ask App</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  .search-bar { background: white; width: 100%; padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; gap: 8px; box-sizing: border-box; }
  input { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 10px; }
  button { padding: 12px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; }
  iframe { width: 100%; height: calc(100vh - 70px); border: none; margin-top: 4px; }
  h1 { font-size: 18px; color: #222; margin: 12px 0 4px 0; }
</style>
</head>
<body>
<div class="search-bar">
  <input type="text" id="question" placeholder="Ask anything..." />
  <button onclick="doSearch()">🔍</button>
</div>
<iframe id="results" src="about:blank"></iframe>
<script>
  function doSearch() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;
    const url = "https://www.google.com/search?q=" + encodeURIComponent(q) + "&igu=1";
    document.getElementById('results').src = url;
  }
  document.getElementById('question').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
