<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ask App" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563eb'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E%3F%3C/text%3E%3C/svg%3E" />
<title>Ask App</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 22px;
    color: #222;
    margin-bottom: 16px;
  }
  .box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
    margin-bottom: 12px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:active {
    background: #1d4ed8;
  }
</style>
</head>
<body>

<h1>📱 Ask App</h1>
<div class="box">
  <input type="text" id="question" placeholder="Type your question..." autofocus />
  <button onclick="doSearch()">Search</button>
</div>

<script>
  function doSearch() {
    const q = document.getElementById('question').value.trim();
    if (!q) return;
    const url = "https://www.google.com/search?q=" + encodeURIComponent(q);
    window.location.href = url;
  }

  document.getElementById('question').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doSearch();
  });
</script>

</body>
</html>
